name: finance_pro
description: Finance Pro - FasXeeH Personal Finance Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Database
  sqflite: ^2.3.2
  path: ^1.9.0
  
  # State Management
  provider: ^6.1.2
  
  # Security
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  
  # Charts
  fl_chart: ^0.68.0
  
  # PDF Export
  pdf: ^3.11.1
  printing: ^5.13.1
  
  # Excel Export
  excel: ^4.0.3
  
  # File saving
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  
  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  
  # Icons
  cupertino_icons: ^1.0.8
  
  # Shared Preferences
  shared_preferences: ^2.3.2
  
  # Lottie animations
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
